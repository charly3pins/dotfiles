context: "When implementing batch operations in agent tools, always add: (1) Maximum limit constant (e.g., 1000 items), (2) Warning threshold for confirmation (e.g., 50+ items), (3) Dry-run mode to preview affected count. This prevents accidental mass updates and gives users confidence in bulk operations."
